<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ビンゴ抽選機</title>
        <!-- 外部スタイルシート参照 -->
        <link href="style.css" rel="stylesheet" type="text/css" />
    </head>
    <body>
        <!-- 効果音 -->
        <audio src="slot.mp3" id="slot" loop></audio>
        <audio src="stop.mp3" id="stop"></audio>

        <!-- 当選パネル -->
        <div class="panel" id="panel">0</div>

        <!-- ボタン (SPIN/STOP) -->
        <button class="button" id="button">SPIN</button>

        <!-- パネル (1〜75) -->
        <div id="board" class="board"></div>

        <!-- スクリプト -->
        <script src="script.js"></script>
    </body>
</html>
